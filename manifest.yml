applications:
  - name: mcp-integration-suite
    memory: 256M
    disk-quota: 1G
    buildpack: nodejs_buildpack
    command: node dist/server.js
    health-check-type: http
    health-check-http-endpoint: /health
    env:
      NODE_ENV: production
      # Prevents Chromium download during npm install (iflow-image tool not supported on BTP)
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_SKIP_DOWNLOAD: "true"
      # Integration Suite credentials — injected below from .env at deploy time
